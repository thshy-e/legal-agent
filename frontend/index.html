</div>

<script>
    const STORAGE_KEY = 'laborhub_sessions_v2';
    const LEGACY_STORAGE_KEY = 'laborhub_sessions';
    const MODE_META = {
        auto: { label: '智能分析', routeLabel: '智能分析', icon: 'fas fa-magic' },
        qa: { label: '法律问答', routeLabel: '法律问答', icon: 'fas fa-book' },
        calc: { label: '赔偿计算', routeLabel: '赔偿测算', icon: 'fas fa-calculator' },
        judge: { label: '案件预判', routeLabel: '案件预判', icon: 'fas fa-chart-line' },
        doc: { label: '文书生成', routeLabel: '文书生成', icon: 'fas fa-file-signature' },
        risk: { label: '风险评估', routeLabel: '风险评估', icon: 'fas fa-exclamation-triangle' },
        error: { label: '系统异常', routeLabel: '系统异常', icon: 'fas fa-exclamation-circle' }
    };

    const WORK_ITEMS = [
        {
            mode: 'calc',
            tone: 'gold',
            icon: 'fas fa-calculator',
            title: '赔偿计算',
            desc: '违法解除、N+1、未签合同双倍工资等金额判断。',
            example: '月薪8000，工作3年，被公司突然辞退且无补偿，能拿多少？'
        },
        {
            mode: 'qa',
            tone: 'dark',
            icon: 'fas fa-book',
            title: '劳动法问答',
            desc: '把公司做法和劳动合同法、劳动法条文对上。',
            example: '劳动法第50条是什么'
        },
        {
            mode: 'doc',
            tone: 'green',
            icon: 'fas fa-file-signature',
            title: '文书生成',
            desc: '根据事实和请求生成劳动仲裁申请书草案。',
            example: '经常需要周末无偿加班，我被迫辞职，请帮我起草仲裁申请书。'
        },
        {
            mode: 'judge',
            tone: 'red',
            icon: 'fas fa-chart-line',
            title: '案件预判',
            desc: '评估争议焦点、胜诉可能和下一步维权策略。',
            example: '公司单方面降薪逼我离职，胜诉概率多大？'
        }
    ];

    let sessions = [];
    let currentSessionId = null;
    let isLoading = false;
    let currentMode = 'auto';
    let autoFollowStream = true;
    let userPausedAutoScroll = false;
    let activeStreamMessage = null;
    let streamAbortController = null;
    let suppressScrollHandler = false;
    const SCROLL_FOLLOW_THRESHOLD = 96;

    function generateId() {
        return Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    }

    function persistSessions() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>"']/g, m => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        })[m]);
    }

    function stripMarkdown(text) {
        return String(text || '')
            .replace(/```[\s\S]*?```/g, ' ')
            .replace(/[#>*_`~-]/g, ' ')
            .replace(/\[(.*?)\]\(.*?\)/g, '$1')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function sanitizeHtml(html) {
        if (window.DOMPurify) {
            return DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
        }
        return String(html || '')
            .replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, '')
            .replace(/\son\w+="[^"]*"/gi, '')
            .replace(/\son\w+='[^']*'/gi, '');
    }

    function renderMarkdownSafe(text) {
        if (!text) return '<p>暂无可展示内容。</p>';
        const html = window.marked ? marked.parse(text) : `<p>${escapeHtml(text)}</p>`;
        return sanitizeHtml(html);
    }

    function firstMeaningfulLines(text, limit = 3) {
        return String(text || '')
            .split(/\n+/)
            .map(line => line.trim())
            .filter(line => line && !/^[-*#>|]+$/.test(line))
            .slice(0, limit);
    }

    function collectLines(text, patterns, limit = 5) {
        const lines = String(text || '')
            .split(/\n+/)
            .map(line => line.trim().replace(/^[-*#\d.、\s]+/, ''))
            .filter(Boolean);
        const found = [];
        for (const line of lines) {
            if (patterns.some(pattern => pattern.test(line)) && !found.includes(line)) {
                found.push(line);
            }
            if (found.length >= limit) break;
        }
        return found;
    }

    function linesToMarkdown(lines, fallback) {
        if (!lines || lines.length === 0) return fallback;
        return lines.map(line => `- ${line}`).join('\n');
    }

    function getModeMeta(modeOrRoute) {
        return MODE_META[modeOrRoute] || MODE_META.qa;
    }

    function getReportTitle(modeOrRoute) {
        const titles = {
            auto: '劳动争议分析报告',
            qa: '法律问答分析报告',
            calc: '赔偿测算报告',
            judge: '案件分析报告',
            doc: '文书生成策略报告',
            risk: '风险评估报告',
            error: '服务状态报告'
        };
        return titles[modeOrRoute] || titles.auto;
    }

    function clampPercent(value, fallback = 64) {
        const num = Number.parseInt(value, 10);
        if (Number.isNaN(num)) return fallback;
        return Math.max(8, Math.min(96, num));
    }

    function inferPrimaryPercent(text, modeOrRoute) {
        if (modeOrRoute === 'error') return 12;
        const matched = String(text || '').match(/(\d{1,3})\s*%/);
        if (matched) return clampPercent(matched[1]);
        const fallback = {
            judge: 72,
            calc: 68,
            doc: 62,
            risk: 58,
            qa: 66,
            auto: 64
        };
        return fallback[modeOrRoute] || 64;
    }

    function inferRiskProfile(text, modeOrRoute) {
        const normalized = String(text || '');
        if (modeOrRoute === 'error') {
            return { level: 'high', label: '服务异常', caption: '当前回答来自异常兜底，请确认后端服务状态后重试。' };
        }
        if (/高风险|严重|违法|败诉|无效|拒绝|不能|不建议/.test(normalized)) {
            return { level: 'high', label: '高风险', caption: '存在明显争议或证据缺口，建议优先固定证据并谨慎行动。' };
        }
        if (/低风险|合法|可行|胜诉概率较高|支持可能较高/.test(normalized)) {
            return { level: 'low', label: '低风险', caption: '当前事实方向相对清晰，仍需核验证据原件与地方裁判口径。' };
        }
        return { level: 'medium', label: '中风险', caption: '结论依赖关键事实和证据完整度，建议补充时间、金额和书面材料。' };
    }

    function buildIssueCards(content, modeOrRoute) {
        const issueLines = collectLines(content, [/争议|焦点|是否|构成|解除|辞退|补偿|赔偿|工资|加班|合同|社保|证据|时效|仲裁/], 3);
        const fallbacks = {
            calc: ['解除原因是否成立', '工资基数与工作年限是否明确', '是否存在 2N、N+1 或双倍工资情形'],
            judge: ['公司行为是否构成违法解除', '劳动者证据是否足以支撑主张', '仲裁请求与时效是否清晰'],
            doc: ['仲裁请求是否完整', '事实经过是否能对应证据', '法律依据是否支撑文书主张'],
            qa: ['公司行为是否合法', '适用条款与例外情形', '下一步取证与维权路径']
        };
        const lines = (issueLines.length ? issueLines : (fallbacks[modeOrRoute] || fallbacks.qa)).slice(0, 3);
        return lines.map((line, index) => `
            <div class="issue-card">
                <strong>焦点 ${index + 1}</strong>
                <span>${escapeHtml(line)}</span>
            </div>
        `).join('');
    }

    function buildEvidenceBars(content, modeOrRoute) {
        const normalized = String(content || '');
        const items = [
            { label: '劳动合同', pattern: /劳动合同|合同|入职|劳动关系/ },
            { label: '工资流水', pattern: /工资|流水|银行|薪资|工资条/ },
            { label: '考勤记录', pattern: /考勤|加班|打卡|工时|排班/ },
            { label: '解除通知', pattern: /解除|辞退|裁员|通知|离职/ },
            { label: '聊天记录', pattern: /聊天|微信|邮件|录音|沟通/ }
        ];
        return items.map(item => {
            const mentioned = item.pattern.test(normalized);
            const base = modeOrRoute === 'judge' ? 48 : 42;
            const strength = Math.min(88, base + (mentioned ? 34 : 0));
            const label = mentioned ? `${strength}%` : '待补';
            return `
                <div class="evidence-row">
                    <span>${escapeHtml(item.label)}</span>
                    <div class="evidence-track"><span style="--strength: ${strength}%"></span></div>
                    <span>${label}</span>
                </div>
            `;
        }).join('');
    }

    function buildTimeline(content) {
        const lines = String(content || '')
            .split(/\n+/)
            .map(line => line.trim().replace(/^[-*#、\s]+/, '').replace(/^\d+[.)、]\s*/, ''))
            .filter(Boolean);
        const datePattern = /((?:19|20)\d{2}(?:年|[-/.]\d{1,2}(?:月|[-/.]\d{1,2}日?)?)?|\d{1,2}月\d{1,2}日?)/;
        const timeline = [];
        for (const line of lines) {
            const dateMatch = line.match(datePattern);
            if (dateMatch || /入职|调岗|降薪|解除|辞退|仲裁|离职|受伤/.test(line)) {
                timeline.push({
                    date: dateMatch ? dateMatch[0] : '待核定',
                    text: line
                });
            }
            if (timeline.length >= 4) break;
        }
        const items = timeline.length ? timeline : [{
            date: '待补充',
            text: '请补充入职时间、争议发生时间、解除或调岗日期，系统可形成案件时间线。'
        }];
        return items.map(item => `
            <div class="timeline-item">
                <span class="timeline-date">${escapeHtml(item.date)}</span>
                <span>${escapeHtml(item.text)}</span>
            </div>
        `).join('');
    }

    function buildCredibilityPanel(content, lawLines, evidenceLines, modeOrRoute) {
        const caseSignals = collectLines(content, [/案例|裁判|判决|相似|法院|仲裁委/], 3);
        const lawCount = lawLines.length || (/劳动合同法|劳动法|法条|法律依据/.test(content) ? 1 : 0);
        const caseCount = caseSignals.length || (modeOrRoute === 'judge' ? 1 : 0);
        const evidenceCount = evidenceLines.length || (/证据|合同|流水|考勤|通知/.test(content) ? 1 : 0);
        return `
            <div class="credibility-panel">
                <div class="credibility-item">
                    <span class="credibility-value">${lawCount}</span>
                    <span class="credibility-label">已提取法条线索</span>
                </div>
                <div class="credibility-item">
                    <span class="credibility-value">${caseCount}</span>
                    <span class="credibility-label">已识别案例线索</span>
                </div>
                <div class="credibility-item">
                    <span class="credibility-value">${evidenceCount}</span>
                    <span class="credibility-label">已识别证据线索</span>
                </div>
                <div class="credibility-item">
                    <span class="credibility-value">2026-06</span>
                    <span class="credibility-label">法条更新提示</span>
                </div>
            </div>
        `;
    }

    function extractFirstMatch(text, patterns) {
        const normalized = String(text || '');
        for (const pattern of patterns) {
            const match = normalized.match(pattern);
            if (match && match[1]) return match[1].trim();
        }
        return '';
    }

    function formatAmount(value) {
        const cleaned = String(value || '').replace(/[，,\s]/g, '');
        const num = Number(cleaned);
        if (!Number.isFinite(num)) return value || '待补充';
        return num.toLocaleString('zh-CN');
    }

    function inferAmountFromFormula(formula) {
        if (!formula || !/[xX×*]/.test(formula)) return '';
        const nums = String(formula).match(/\d+(?:\.\d+)?/g);
        if (!nums || nums.length < 2 || nums.length > 4) return '';
        const product = nums.map(Number).reduce((acc, num) => acc * num, 1);
        if (!Number.isFinite(product) || product <= 0) return '';
        return String(product);
    }

    function getCalculationResult(content, modeOrRoute) {
        const finalAmount = extractFirstMatch(content, [
            /最终金额[：:\s]*([0-9][0-9,，.]*)\s*元/i,
            /最终(?:赔偿|补偿)?金额[：:\s]*([0-9][0-9,，.]*)\s*元/i,
            /(?:赔偿金额|赔偿金|测算金额|应得金额)[：:\s]*([0-9][0-9,，.]*)\s*元/i
        ]);
        const formula = extractFirstMatch(content, [
            /计算公式[：:\s]*([^\n。；;]+)/i,
            /公式[：:\s]*([^\n。；;]+)/i
        ]);
        const inferredAmount = finalAmount || inferAmountFromFormula(formula);
        const wage = extractFirstMatch(content, [
            /工资基数[：:\s]*([0-9][0-9,，.]*)\s*元/i,
            /月(?:平均)?工资[：:\s]*([0-9][0-9,，.]*)\s*元/i,
            /月薪[：:\s]*([0-9][0-9,，.]*)\s*元/i
        ]);
        const years = extractFirstMatch(content, [
            /工作年限[：:\s]*([0-9.]+)\s*年/i,
            /工作\s*([0-9.]+)\s*年/i
        ]);
        const months = extractFirstMatch(content, [
            /补偿月数[：:\s]*([0-9.]+)\s*个?月/i
        ]);
        const compensationType = extractFirstMatch(content, [
            /(?:解除\/赔偿类型|赔偿类型|解除类型)[：:\s]*([^\n。；;]+)/i
        ]);
        return {
            show: modeOrRoute === 'calc' || Boolean(inferredAmount || formula || wage || years || months || compensationType),
            amount: inferredAmount,
            formula,
            wage,
            years,
            months,
            compensationType
        };
    }

    function buildCalculationResultPanel(result) {
        if (!result.show) return '';
        const amount = result.amount ? `${formatAmount(result.amount)}<span class="currency-unit">元</span>` : '待补充';
        const formula = result.formula || '补齐工资基数、工作年限和解除类型后可生成公式。';
        const items = [
            ['工资基数', result.wage ? `${formatAmount(result.wage)} 元` : '待补充'],
            ['工作年限', result.years ? `${result.years} 年` : '待补充'],
            ['补偿月数', result.months ? `${result.months} 个月` : '按规则判断'],
            ['赔偿类型', result.compensationType || '按解除原因判断'],
            ['计算公式', formula],
            ['最终金额', result.amount ? `${formatAmount(result.amount)} 元` : '待补充']
        ];
        return `
            <section class="report-section">
                <h3><i class="fas fa-coins"></i> 赔偿计算结果</h3>
                <div class="calc-result-card">
                    <div class="calc-amount-block">
                        <span class="calc-amount-label">结构化提取金额</span>
                        <strong class="calc-amount">${amount}</strong>
                        <span class="calc-formula">${escapeHtml(formula)}</span>
                    </div>
                    <div class="calc-grid">
                        ${items.map(([label, value]) => `
                            <div class="calc-item">
                                <span>${escapeHtml(label)}</span>
                                <strong>${escapeHtml(value)}</strong>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </section>
        `;
    }

    function setMode(mode) {
        currentMode = MODE_META[mode] ? mode : 'auto';
        document.querySelectorAll('.mode-option').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === currentMode);
        });
        document.getElementById('currentModeTitle').innerText = `当前模式：${getModeMeta(currentMode).label}`;
    }

    function inferCaseTitle(text, mode = currentMode) {
        const normalized = String(text || '');
        if (/未签|双倍工资/.test(normalized)) return '未签合同双倍工资';
        if (/辞退|解除|裁员|赔偿|补偿|N\+1|2N/i.test(normalized)) return '违法解除赔偿测算';
        if (/加班|周末|调休/.test(normalized)) return '加班费与证据';
        if (/仲裁|申请书|文书|起草|投诉书/.test(normalized) || mode === 'doc') return '劳动仲裁文书';
        if (/降薪|调岗|搬迁/.test(normalized)) return '调岗降薪维权';
        if (/工伤|受伤|职业病/.test(normalized)) return '工伤认定与待遇';
        if (/扣工资|罚款|迟到/.test(normalized)) return '工资扣罚合规';
        if (/社保|公积金/.test(normalized)) return '社保补缴争议';
        if (mode === 'calc') return '赔偿金额测算';
        if (mode === 'judge') return '案件胜诉预判';
        return stripMarkdown(normalized).slice(0, 18) || '新会话';
    }

    function createNewSession() {
        const newSession = {
            id: generateId(),
            title: '新会话',
            messages: [],
            createdAt: Date.now()
        };
        sessions.unshift(newSession);
        currentSessionId = newSession.id;
        autoFollowStream = true;
        userPausedAutoScroll = false;
        persistSessions();
        renderHistoryList();
        renderCurrentChat();
    }

    function deleteSession(sessionId, event) {
        if (event) event.stopPropagation();
        sessions = sessions.filter(sess => sess.id !== sessionId);
        if (!sessions.length) {
            createNewSession();
            return;
        }
        if (currentSessionId === sessionId) currentSessionId = sessions[0].id;
        persistSessions();
        renderHistoryList();
        renderCurrentChat();
    }

    function switchSession(sessionId) {
        if (isLoading) return;
        currentSessionId = sessionId;
        autoFollowStream = true;
        userPausedAutoScroll = false;
        closeSidebar();
        renderHistoryList();
        renderCurrentChat();
    }

    function renderHistoryList() {
        const container = document.getElementById('historyList');
        container.innerHTML = '';
        sessions.forEach(sess => {
            const item = document.createElement('div');
            item.className = 'history-item';
            if (sess.id === currentSessionId) item.classList.add('active');
            item.innerHTML = `
                <button class="history-open" type="button">
                    <i class="far fa-comment-dots"></i>
                    <span class="history-title">${escapeHtml(sess.title || '新会话')}</span>
                </button>
                <button class="delete-session" type="button" aria-label="删除会话">
                    <i class="fas fa-trash-alt"></i>
                </button>
            `;
            item.querySelector('.history-open').addEventListener('click', () => switchSession(sess.id));
            item.querySelector('.delete-session').addEventListener('click', (event) => deleteSession(sess.id, event));
            container.appendChild(item);
        });
    }

    function renderWelcome(container) {
        const welcome = document.createElement('div');
        welcome.className = 'welcome-screen';
        welcome.id = 'dynamicWelcome';
        welcome.innerHTML = `
            <div class="welcome-kicker"><i class="fas fa-balance-scale"></i> 劳动争议专用法律 AI</div>
            <h2 class="welcome-heading">劳法智枢</h2>
            <p class="welcome-copy">AI 劳动争议分析与法律决策系统。输入案件事实、赔偿需求或证据情况，生成可追溯的法律分析报告。</p>
            <div class="task-grid">
                ${WORK_ITEMS.map(item => `
                    <button class="task-card ${item.tone}" type="button" data-mode="${item.mode}" data-prompt="${escapeHtml(item.example)}">
                        <span class="task-icon"><i class="${item.icon}"></i></span>
                        <span class="task-title">${escapeHtml(item.title)}</span>
                        <span class="task-desc">${escapeHtml(item.desc)}</span>
                        <span class="task-example">示例：${escapeHtml(item.example)}</span>
                    </button>
                `).join('')}
            </div>
        `;
        container.appendChild(welcome);
        welcome.querySelectorAll('.task-card').forEach(card => {
            card.addEventListener('click', () => {
                setMode(card.dataset.mode || 'auto');
                const input = document.getElementById('messageInput');
                input.value = card.dataset.prompt || '';
                autoResizeTextarea(input);
                sendMessage();
            });
        });
    }

    function renderCurrentChat() {
        const chatContainer = document.getElementById('chatBox');
        const currentSession = sessions.find(sess => sess.id === currentSessionId);
        chatContainer.innerHTML = '';
        const inner = document.createElement('div');
        inner.className = 'chat-inner';
        chatContainer.appendChild(inner);

        if (!currentSession || currentSession.messages.length === 0) {
            renderWelcome(inner);
            return;
        }
        currentSession.messages.forEach(msg => {
            const status = ['thinking', 'streaming'].includes(msg.runtimeStatus) ? 'complete' : (msg.runtimeStatus || 'complete');
            renderMessageToContainer(msg.role, msg.content, msg.route, inner, msg.mode, msg.structured, status);
        });
        updateFollowButton();
    }

    function buildLegalReport(content, route, mode, structured = null, runtimeStatus = 'complete') {
        const activeMode = route === 'error' ? 'error' : (mode || route || 'qa');
        const resolvedMode = activeMode === 'auto' ? (route || 'auto') : activeMode;
        const routeMeta = getModeMeta(resolvedMode);
        const reportTitle = getReportTitle(resolvedMode);
        const data = structured || buildFallbackStructured(content, resolvedMode);
        const statusMeta = getRuntimeStatusMeta(runtimeStatus);
        const answerHtml = content
            ? `${renderMarkdownSafe(content)}${runtimeStatus === 'streaming' ? '<span class="stream-caret"></span>' : ''}`
            : `<p class="empty-answer">${runtimeStatus === 'thinking' ? '\u6b63\u5728\u751f\u6210\u7b56\u7565\u89e3\u91ca...' : '\u6682\u65e0\u7b56\u7565\u89e3\u91ca\u3002'}</p>`;

        return `
            <article class="report-card" data-runtime-status="${escapeHtml(runtimeStatus)}">
                <div class="report-head">
                    <div class="report-title-block">
                        <span class="route-badge"><i class="${routeMeta.icon}"></i> ${escapeHtml(routeMeta.routeLabel)}</span>
                        <h2 class="report-title">${escapeHtml(reportTitle)}</h2>
                        <p class="report-subtitle">\u7ed3\u6784\u5316\u5c42\u5c55\u793a\u6570\u636e\uff0cAI \u6b63\u6587\u89e3\u91ca\u4e89\u8bae\u7126\u70b9\u3001\u98ce\u9669\u548c\u7b56\u7565\u3002</p>
                    </div>
                    <span class="runtime-state ${escapeHtml(runtimeStatus)}">
                        ${statusMeta.live ? '<span class="runtime-dot"></span>' : ''}
                        ${escapeHtml(statusMeta.label)}
                    </span>
                </div>
                <div class="report-body">
                    ${buildStructuredMetrics(data, runtimeStatus)}
                    ${buildStructuredCalculation(data.calculation)}
                    <section class="report-section">
                        <h3><i class="fas fa-bullseye"></i> \u6838\u5fc3\u4e89\u8bae\u7126\u70b9</h3>
                        <div class="issue-grid">${buildStructuredIssues(data.issues)}</div>
                    </section>
                    <section class="report-section">
                        <h3><i class="fas fa-folder-open"></i> \u8bc1\u636e\u5f3a\u5ea6</h3>
                        <div class="evidence-bars">${buildStructuredEvidence(data.evidence)}</div>
                    </section>
                    <section class="report-section">
                        <h3><i class="fas fa-stream"></i> \u6848\u4ef6\u65f6\u95f4\u7ebf</h3>
                        <div class="case-timeline">${buildStructuredTimeline(data.timeline)}</div>
                    </section>
                    <section class="report-section">
                        <h3><i class="fas fa-tasks"></i> \u4e0b\u4e00\u6b65\u884c\u52a8</h3>
                        <div class="issue-grid">${buildStructuredActions(data.actions)}</div>
                    </section>
                    <section class="report-section ai-answer-card">
                        <h3><i class="fas fa-scale-balanced"></i> AI \u7b56\u7565\u89e3\u91ca</h3>
                        <div class="section-content">${answerHtml}</div>
                    </section>
                    <section class="report-section">
                        <div class="legal-disclaimer">
                            <i class="fas fa-info-circle"></i>
                            <span>\u672c\u7ed3\u679c\u7531 AI \u751f\u6210\uff0c\u4ec5\u4f9b\u53c2\u8003\uff0c\u4e0d\u6784\u6210\u6b63\u5f0f\u6cd5\u5f8b\u610f\u89c1\uff1b\u5173\u952e\u6848\u4ef6\u5e94\u7531\u6267\u4e1a\u5f8b\u5e08\u7ed3\u5408\u8bc1\u636e\u539f\u4ef6\u590d\u6838\u3002</span>
                        </div>
                    </section>
                </div>
            </article>
        `;
    }

    function getRuntimeStatusMeta(status) {
        const states = {
            idle: { label: '\u5f85\u53d1\u9001', live: false },
            thinking: { label: '\u6b63\u5728\u601d\u8003', live: true },
            streaming: { label: '\u6d41\u5f0f\u751f\u6210\u4e2d', live: true },
            complete: { label: '\u5df2\u5b8c\u6210', live: false },
            error: { label: '\u751f\u6210\u5f02\u5e38', live: false }
        };
        return states[status] || states.complete;
    }

    function buildFallbackStructured(content, route) {
        const evidenceLines = collectLines(content, [/\u8bc1\u636e|\u5408\u540c|\u6d41\u6c34|\u8003\u52e4|\u901a\u77e5|\u804a\u5929|\u5f55\u97f3|\u793e\u4fdd|\u5de5\u8d44\u6761|\u5de5\u724c|\u90ae\u4ef6/], 5);
        const calcResult = getCalculationResult(content, route);
        const risk = inferRiskProfile(content, route);
        return {
            calculation: calcResult,
            metrics: [
                calcResult.amount
                    ? { label: '\u8d54\u507f\u91d1\u989d', value: formatAmount(calcResult.amount), unit: '\u5143', kind: 'amount', caption: '\u7531\u5386\u53f2\u6587\u672c\u63d0\u53d6\u3002' }
                    : { label: '\u5206\u6790\u72b6\u6001', value: '\u5df2\u751f\u6210', unit: '', kind: 'status', caption: '\u65e7\u4f1a\u8bdd\u6309\u517c\u5bb9\u6a21\u5f0f\u5c55\u793a\u3002' },
                { label: '\u98ce\u9669\u7b49\u7ea7', value: risk.label, unit: '', kind: 'risk', caption: risk.caption },
                { label: '\u8bc1\u636e\u5b8c\u6574\u5ea6', value: `${evidenceLines.length}/5`, unit: '', kind: 'evidence', caption: '\u6839\u636e\u5386\u53f2\u6587\u672c\u4f30\u7b97\u3002' }
            ],
            risk,
            evidence: buildFallbackEvidence(content),
            timeline: buildFallbackTimeline(content),
            actions: firstMeaningfulLines(content, 3).map(line => ({ label: '\u5efa\u8bae', text: line })),
            issues: buildFallbackIssues(content, route)
        };
    }

    function buildStructuredMetrics(data, runtimeStatus) {
        const metrics = Array.isArray(data?.metrics) && data.metrics.length ? data.metrics : [];
        if (!metrics.length && ['thinking', 'streaming'].includes(runtimeStatus)) {
            return `
                <div class="report-metrics">
                    ${[1, 2, 3].map(index => `
                        <div class="metric-card placeholder">
                            <div class="metric-label"><i class="fas fa-circle-notch fa-spin"></i> \u6307\u6807 ${index}</div>
                            <div class="metric-value">...</div>
                            <div class="metric-caption">\u7b49\u5f85\u7ed3\u6784\u5316\u6570\u636e</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }
        const safeMetrics = (metrics.length ? metrics : [
            { label: '\u5206\u6790\u72b6\u6001', value: '\u5f85\u751f\u6210', unit: '', kind: 'status', caption: '\u7b49\u5f85 AI Runtime \u8fd4\u56de\u7ed3\u6784\u5316\u5bf9\u8c61\u3002' },
            { label: '\u98ce\u9669\u7b49\u7ea7', value: '\u5f85\u5224\u65ad', unit: '', kind: 'risk', caption: '\u9700\u8981\u7ed3\u5408\u4e8b\u5b9e\u548c\u8bc1\u636e\u5224\u65ad\u3002' },
            { label: '\u8bc1\u636e\u5b8c\u6574\u5ea6', value: '\u5f85\u8865\u5145', unit: '', kind: 'evidence', caption: '\u8865\u9f50\u6750\u6599\u540e\u66f4\u7a33\u5b9a\u3002' }
        ]).slice(0, 3);
        return `<div class="report-metrics">${safeMetrics.map(metric => buildMetricCard(metric, data?.risk)).join('')}</div>`;
    }

    function buildMetricCard(metric, risk) {
        const kind = metric.kind || '';
        const isAmount = kind === 'amount';
        const unit = metric.unit ? `<span class="currency-unit">${escapeHtml(metric.unit)}</span>` : '';
        const value = kind === 'risk'
            ? `<span class="risk-chip ${escapeHtml(risk?.level || 'medium')}"><i class="fas fa-circle"></i> ${escapeHtml(metric.value || '\u5f85\u5224\u65ad')}</span>`
            : `${escapeHtml(metric.value || '\u5f85\u8865\u5145')}${unit}`;
        const meter = kind === 'risk' && risk?.score
            ? `<div class="metric-meter"><div class="metric-fill" style="--metric: ${Number(risk.score) || 0}%"></div></div>`
            : '';
        return `
            <div class="metric-card">
                <div class="metric-label"><i class="${isAmount ? 'fas fa-coins' : 'fas fa-chart-line'}"></i> ${escapeHtml(metric.label || '\u6307\u6807')}</div>
                <div class="metric-value ${isAmount ? 'amount' : ''}">${value}</div>
                <div class="metric-caption">${escapeHtml(metric.caption || '')}</div>
                ${meter}
            </div>
        `;
    }

    function normalizeCalculation(result) {
        if (!result || !result.show) return null;
        return {
            amount: result.amount || '',
            formula: result.formula || '',
            wage: result.wage || '',
            years: result.years || '',
            months: result.months || '',
            compensationType: result.compensation_type || result.compensationType || '',
            status: result.status || 'complete'
        };
    }

    function buildStructuredCalculation(rawResult) {
        const result = normalizeCalculation(rawResult);
        if (!result) return '';
        const amount = result.amount ? `${formatAmount(result.amount)}<span class="currency-unit">\u5143</span>` : '\u5f85\u8865\u5145';
        const formula = result.formula || '\u8865\u9f50\u5de5\u8d44\u57fa\u6570\u3001\u5de5\u4f5c\u5e74\u9650\u548c\u89e3\u9664\u7c7b\u578b\u540e\u53ef\u751f\u6210\u516c\u5f0f\u3002';
        const items = [
            ['\u5de5\u8d44\u57fa\u6570', result.wage ? `${formatAmount(result.wage)} \u5143` : '\u5f85\u8865\u5145'],
            ['\u5de5\u4f5c\u5e74\u9650', result.years ? `${result.years} \u5e74` : '\u5f85\u8865\u5145'],
            ['\u8865\u507f\u6708\u6570', result.months ? `${result.months} \u4e2a\u6708` : '\u6309\u89c4\u5219\u5224\u65ad'],
            ['\u8d54\u507f\u7c7b\u578b', result.compensationType || '\u6309\u89e3\u9664\u539f\u56e0\u5224\u65ad'],
            ['\u8ba1\u7b97\u516c\u5f0f', formula],
            ['\u6700\u7ec8\u91d1\u989d', result.amount ? `${formatAmount(result.amount)} \u5143` : '\u5f85\u8865\u5145']
        ];
        return `
            <section class="report-section">
                <h3><i class="fas fa-coins"></i> \u7ed3\u6784\u5316\u8ba1\u7b97\u7ed3\u679c</h3>
                <div class="calc-result-card">
                    <div class="calc-amount-block">
                        <span class="calc-amount-label">\u8d54\u507f\u91d1\u989d</span>
                        <strong class="calc-amount">${amount}</strong>
                        <span class="calc-formula">${escapeHtml(formula)}</span>
                    </div>
                    <div class="calc-grid">
                        ${items.map(([label, value]) => `
                            <div class="calc-item">
                                <span>${escapeHtml(label)}</span>
                                <strong>${escapeHtml(value)}</strong>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </section>
        `;
    }

    function buildStructuredIssues(issues) {
        const list = Array.isArray(issues) && issues.length ? issues : ['\u9002\u7528\u89c4\u5219\u662f\u5426\u660e\u786e', '\u5173\u952e\u4e8b\u5b9e\u662f\u5426\u5b8c\u6574', '\u8bc1\u636e\u94fe\u662f\u5426\u95ed\u5408'];
        return list.slice(0, 3).map((issue, index) => `
            <div class="issue-card">
                <strong>\u7126\u70b9 ${index + 1}</strong>
                <span>${escapeHtml(issue)}</span>
            </div>
        `).join('');
    }

    function buildStructuredEvidence(evidence) {
        const items = Array.isArray(evidence) && evidence.length ? evidence : [
            { label: '\u52b3\u52a8\u5408\u540c', strength: 38, status: '\u5f85\u8865\u5145' },
            { label: '\u5de5\u8d44\u6d41\u6c34', strength: 38, status: '\u5f85\u8865\u5145' },
            { label: '\u89e3\u9664\u901a\u77e5', strength: 38, status: '\u5f85\u8865\u5145' }
        ];
        return items.map(item => `
            <div class="evidence-row">
                <span>${escapeHtml(item.label || '\u8bc1\u636e')}</span>
                <div class="evidence-track"><span style="--strength: ${Number(item.strength) || 38}%"></span></div>
                <span>${escapeHtml(item.status || '\u5f85\u8865\u5145')}</span>
            </div>
        `).join('');
    }

    function buildStructuredTimeline(timeline) {
        const items = Array.isArray(timeline) && timeline.length ? timeline : [{ date: '\u5f85\u8865\u5145', text: '\u8865\u5145\u5165\u804c\u3001\u89e3\u9664\u3001\u79bb\u804c\u548c\u4ef2\u88c1\u7533\u8bf7\u7b49\u8282\u70b9\u3002' }];
        return items.slice(0, 4).map(item => `
            <div class="timeline-item">
                <span class="timeline-date">${escapeHtml(item.date || '\u5f85\u6838\u5b9e')}</span>
                <span>${escapeHtml(item.text || '')}</span>
            </div>
        `).join('');
    }

    function buildStructuredActions(actions) {
        const items = Array.isArray(actions) && actions.length ? actions : [{ label: '\u6574\u7406\u4e8b\u5b9e', text: '\u6309\u65f6\u95f4\u987a\u5e8f\u6574\u7406\u4e8b\u5b9e\u548c\u8bc1\u636e\u3002' }];
        return items.slice(0, 3).map(item => `
            <div class="issue-card">
                <strong>${escapeHtml(item.label || '\u884c\u52a8')}</strong>
                <span>${escapeHtml(item.text || item)}</span>
            </div>
        `).join('');
    }

    function buildFallbackEvidence(content) {
        const normalized = String(content || '');
        const items = [
            { label: '\u52b3\u52a8\u5408\u540c', pattern: /\u52b3\u52a8\u5408\u540c|\u5408\u540c|\u5165\u804c|\u52b3\u52a8\u5173\u7cfb/ },
            { label: '\u5de5\u8d44\u6d41\u6c34', pattern: /\u5de5\u8d44|\u6d41\u6c34|\u94f6\u884c|\u85aa\u8d44|\u5de5\u8d44\u6761/ },
            { label: '\u89e3\u9664\u901a\u77e5', pattern: /\u89e3\u9664|\u8f9e\u9000|\u88c1\u5458|\u901a\u77e5|\u79bb\u804c/ },
            { label: '\u8003\u52e4\u8bb0\u5f55', pattern: /\u8003\u52e4|\u52a0\u73ed|\u6253\u5361|\u5de5\u65f6|\u6392\u73ed/ },
            { label: '\u6c9f\u901a\u8bb0\u5f55', pattern: /\u804a\u5929|\u5fae\u4fe1|\u90ae\u4ef6|\u5f55\u97f3|\u6c9f\u901a/ }
        ];
        return items.map(item => ({
            label: item.label,
            status: item.pattern.test(normalized) ? '\u5df2\u63d0\u53ca' : '\u5f85\u8865\u5145',
            strength: item.pattern.test(normalized) ? 76 : 38
        }));
    }

    function buildFallbackTimeline(content) {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = buildTimeline(content);
        const items = [...wrapper.querySelectorAll('.timeline-item')].map(row => ({
            date: row.querySelector('.timeline-date')?.innerText || '\u5f85\u6838\u5b9e',
            text: row.innerText.replace(row.querySelector('.timeline-date')?.innerText || '', '').trim()
        }));
        return items.length ? items : [{ date: '\u5f85\u8865\u5145', text: '\u8865\u5145\u5173\u952e\u65f6\u95f4\u8282\u70b9\u540e\u5f62\u6210\u65f6\u95f4\u7ebf\u3002' }];
    }

    function buildFallbackIssues(content, route) {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = buildIssueCards(content, route);
        const issues = [...wrapper.querySelectorAll('.issue-card span')].map(item => item.innerText.trim()).filter(Boolean);
        return issues.length ? issues : ['\u9002\u7528\u89c4\u5219\u662f\u5426\u660e\u786e', '\u5173\u952e\u4e8b\u5b9e\u662f\u5426\u5b8c\u6574', '\u8bc1\u636e\u94fe\u662f\u5426\u95ed\u5408'];
    }

    function renderMessageToContainer(role, content, route, container, mode = null, structured = null, runtimeStatus = 'complete') {
        const row = document.createElement('div');
        row.className = `message-row ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'avatar-icon';
        avatar.innerHTML = role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-balance-scale"></i>';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        if (role === 'user') {
            bubble.innerText = content;
        } else {
            bubble.innerHTML = buildLegalReport(content, route, mode, structured, runtimeStatus);
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        container.appendChild(row);
        return { row, bubble };
    }

    function appendNewMessage(role, content, route = null, mode = null, toSession = true, extra = {}) {
        const inner = document.querySelector('.chat-inner');
        const welcome = document.getElementById('dynamicWelcome');
        if (welcome) welcome.remove();
        renderMessageToContainer(role, content, route, inner, mode, extra.structured, extra.runtimeStatus || 'complete');
        maybeFollowStream();

        if (!toSession || !currentSessionId) return null;
        const session = sessions.find(sess => sess.id === currentSessionId);
        if (!session) return null;
        const message = {
            role,
            content,
            route,
            mode,
            structured: extra.structured || null,
            runtimeStatus: extra.runtimeStatus || 'complete',
            timestamp: Date.now()
        };
        session.messages.push(message);
        if (role === 'user' && session.messages.filter(msg => msg.role === 'user').length === 1) {
            session.title = inferCaseTitle(content, mode || currentMode);
        }
        persistSessions();
        renderHistoryList();
        return message;
    }

    function createAIMessage(mode = currentMode) {
        const inner = document.querySelector('.chat-inner');
        const session = sessions.find(sess => sess.id === currentSessionId);
        let lastIndex;
        const message = {
            role: 'ai',
            content: '',
            route: mode === 'calc' ? 'qa' : null,
            mode,
            structured: null,
            runtimeStatus: 'thinking',
            tempId: Date.now(),
            timestamp: Date.now()
        };
        if (session) {
            session.messages.push(message);
            lastIndex = session.messages.length - 1;
        }
        const rendered = renderMessageToContainer('ai', '', message.route, inner, mode, null, 'thinking');
        maybeFollowStream(true);
        return { ...rendered, session, lastIndex, message };
    }

    function updateAIMessage(rendered, patch) {
        Object.assign(rendered.message, patch);
        const runtimeStatus = rendered.message.runtimeStatus || 'streaming';
        rendered.bubble.innerHTML = buildLegalReport(
            rendered.message.content || '',
            rendered.message.route || 'qa',
            rendered.message.mode || currentMode,
            rendered.message.structured,
            runtimeStatus
        );
        if (rendered.session && rendered.lastIndex !== undefined) {
            rendered.session.messages[rendered.lastIndex] = { ...rendered.message };
        }
        persistSessions();
        maybeFollowStream();
    }

    function createSseParser(onEvent) {
        let buffer = '';
        return chunk => {
            buffer += chunk;
            const parts = buffer.split(/\r?\n\r?\n/);
            buffer = parts.pop() || '';
            parts.forEach(block => {
                let event = 'message';
                const dataLines = [];
                block.split(/\r?\n/).forEach(line => {
                    if (line.startsWith('event:')) event = line.slice(6).trim();
                    if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart());
                });
                if (!dataLines.length) return;
                try {
                    onEvent(event, JSON.parse(dataLines.join('\n')));
                } catch (error) {
                    console.warn('SSE parse failed', error, block);
                }
            });
        };
    }

    async function readStreamingResponse(response, onEvent) {
        const reader = response.body?.getReader();
        if (!reader) throw new Error('ReadableStream is not supported');
        const decoder = new TextDecoder('utf-8');
        const parse = createSseParser(onEvent);
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            parse(decoder.decode(value, { stream: true }));
        }
        parse(decoder.decode());
    }

    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;

        isLoading = true;
        autoFollowStream = true;
        userPausedAutoScroll = false;
        updateFollowButton();
        const sendBtn = document.getElementById('sendMsgBtn');
        sendBtn.disabled = true;
        input.disabled = true;

        const selectedMode = currentMode;
        input.value = '';
        autoResizeTextarea(input);
        appendNewMessage('user', text, null, selectedMode);

        const rendered = createAIMessage(selectedMode);
        activeStreamMessage = rendered.message;
        streamAbortController = new AbortController();

        try {
            const body = {
                query: text,
                preferred_mode: selectedMode === 'auto' ? undefined : selectedMode,
                ui_mode: selectedMode,
                session_id: currentSessionId
            };
            const response = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal: streamAbortController.signal
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            await readStreamingResponse(response, (event, data) => {
                if (event === 'route') {
                    const routeType = selectedMode === 'calc' ? 'calc' : (data.route || 'qa');
                    updateAIMessage(rendered, { route: routeType, runtimeStatus: 'thinking' });
                }
                if (event === 'thinking') {
                    updateAIMessage(rendered, { runtimeStatus: 'thinking' });
                }
                if (event === 'structured') {
                    updateAIMessage(rendered, { structured: data.structured || null, runtimeStatus: 'streaming' });
                }
                if (event === 'token') {
                    updateAIMessage(rendered, {
                        content: (rendered.message.content || '') + (data.delta || ''),
                        runtimeStatus: 'streaming'
                    });
                }
                if (event === 'done') {
                    const routeType = selectedMode === 'calc' ? 'calc' : (data.route || rendered.message.route || 'qa');
                    updateAIMessage(rendered, {
                        content: data.answer || rendered.message.content || '',
                        route: routeType,
                        structured: data.structured || rendered.message.structured || null,
                        runtimeStatus: 'complete'
                    });
                }
                if (event === 'error') {
                    updateAIMessage(rendered, {
                        content: data.message || '\u540e\u7aef\u670d\u52a1\u6682\u65f6\u4e0d\u53ef\u7528\u3002',
                        route: 'error',
                        runtimeStatus: 'error'
                    });
                }
            });
        } catch (error) {
            console.error(error);
            updateAIMessage(rendered, {
                content: '\u540e\u7aef\u670d\u52a1\u672a\u8fde\u63a5\u6216\u6682\u65f6\u4e0d\u53ef\u7528\u3002\u8bf7\u786e\u8ba4 FastAPI \u670d\u52a1\u5df2\u8fd0\u884c\uff0c\u5e76\u7a0d\u540e\u91cd\u65b0\u53d1\u9001\u3002',
                route: 'error',
                runtimeStatus: 'error'
            });
        } finally {
            isLoading = false;
            activeStreamMessage = null;
            streamAbortController = null;
            sendBtn.disabled = false;
            input.disabled = false;
            input.focus();
            renderHistoryList();
            updateFollowButton();
            maybeFollowStream();
        }
    }

    function isNearBottom(container = document.getElementById('chatBox')) {
        if (!container) return true;
        return container.scrollHeight - container.scrollTop - container.clientHeight <= SCROLL_FOLLOW_THRESHOLD;
    }

    function scrollToBottom(container, behavior = 'auto') {
        if (!container) return;
        suppressScrollHandler = true;
        container.scrollTo({ top: container.scrollHeight, behavior });
        window.setTimeout(() => { suppressScrollHandler = false; }, 80);
    }

    function maybeFollowStream(force = false) {
        const container = document.getElementById('chatBox');
        if (!container) return;
        if (force || autoFollowStream) scrollToBottom(container);
        updateFollowButton();
    }

    function updateScrollStateFromUser() {
        if (suppressScrollHandler) return;
        const container = document.getElementById('chatBox');
        const nearBottom = isNearBottom(container);
        autoFollowStream = nearBottom;
        userPausedAutoScroll = isLoading && !nearBottom;
        updateFollowButton();
    }

    function updateFollowButton() {
        const button = document.getElementById('streamFollowBtn');
        if (!button) return;
        button.classList.toggle('show', Boolean(isLoading && userPausedAutoScroll));
    }

    function jumpToLatestStream() {
        autoFollowStream = true;
        userPausedAutoScroll = false;
        scrollToBottom(document.getElementById('chatBox'), 'smooth');
        updateFollowButton();
    }

    function autoResizeTextarea(textarea) {
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 170) + 'px';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
    }

    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').classList.add('show');
    }

    function loadSessions() {
        const stored = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(LEGACY_STORAGE_KEY);
        if (stored) {
            try {
                sessions = JSON.parse(stored).map(sess => ({
                    id: sess.id || generateId(),
                    title: sess.title || inferCaseTitle(sess.messages?.find(msg => msg.role === 'user')?.content || ''),
                    messages: Array.isArray(sess.messages)
                        ? sess.messages.map(msg => ({
                            role: msg.role || 'ai',
                            content: msg.content || '',
                            route: msg.route || null,
                            mode: msg.mode || null,
                            structured: msg.structured || null,
                            runtimeStatus: msg.runtimeStatus && !['thinking', 'streaming'].includes(msg.runtimeStatus) ? msg.runtimeStatus : 'complete',
                            timestamp: msg.timestamp || Date.now()
                        }))
                        : [],
                    createdAt: sess.createdAt || Date.now()
                }));
            } catch (error) {
                sessions = [];
            }
        }
        if (!sessions.length) {
            sessions = [{ id: generateId(), title: '新会话', messages: [], createdAt: Date.now() }];
        }
        currentSessionId = sessions[0].id;
        persistSessions();
    }

    function bindEvents() {
        document.getElementById('sendMsgBtn').addEventListener('click', sendMessage);
        document.getElementById('streamFollowBtn').addEventListener('click', jumpToLatestStream);
        document.getElementById('chatBox').addEventListener('scroll', updateScrollStateFromUser, { passive: true });
        document.getElementById('newChatBtn').addEventListener('click', () => {
            if (!isLoading) {
                createNewSession();
                closeSidebar();
            }
        });
        document.getElementById('mobileMenuBtn').addEventListener('click', openSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        const textarea = document.getElementById('messageInput');
        textarea.addEventListener('input', () => autoResizeTextarea(textarea));
        textarea.addEventListener('keydown', event => {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        document.querySelectorAll('.mode-option').forEach(button => {
            button.addEventListener('click', () => {
                setMode(button.dataset.mode);
                if (window.innerWidth <= 900) closeSidebar();
            });
        });
        document.querySelectorAll('.hint-chip').forEach(button => {
            button.addEventListener('click', () => {
                const insert = button.dataset.insert || '';
                const prefix = textarea.value.trim() ? '\n' : '';
                textarea.value += prefix + insert;
                textarea.focus();
                autoResizeTextarea(textarea);
            });
        });
    }

    function init() {
        loadSessions();
        bindEvents();
        setMode('auto');
        renderHistoryList();
        renderCurrentChat();
    }

    init();
</script>
