<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>劳法智枢 · 法律 AI 工作台</title>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --ink: #0f172a;
            --ink-soft: #334155;
            --muted: #64748b;
            --line: #d8dee8;
            --line-soft: #e7ecf3;
            --canvas: #f8fafc;
            --surface: #ffffff;
            --surface-soft: #f4f7fb;
            --nav: #0f172a;
            --nav-soft: #172033;
            --primary: #0f172a;
            --primary-soft: #eef2f7;
            --gold: #c8a96b;
            --gold-deep: #8a6b2e;
            --gold-soft: #fbf5e8;
            --green: #15803d;
            --green-soft: #e9f7ee;
            --red: #b42318;
            --red-soft: #fdecea;
            --amber: #b7791f;
            --amber-soft: #fff7df;
            --shadow: 0 18px 44px rgba(15, 23, 42, 0.09);
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            overflow: hidden;
            color: var(--ink);
            background: var(--canvas);
            font-family: Inter, "HarmonyOS Sans SC", system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            letter-spacing: 0;
        }
        button, textarea { font: inherit; }
        button { border: 0; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c7ced8; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #98a2b3; }

        .app-shell {
            display: flex;
            width: 100%;
            height: 100vh;
            min-height: 0;
            background: var(--canvas);
        }

        .sidebar {
            width: 292px;
            min-width: 292px;
            display: flex;
            flex-direction: column;
            background: var(--nav);
            color: #f9fafb;
            border-right: 1px solid rgba(255,255,255,0.08);
            z-index: 30;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 22px 20px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .brand-mark {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            color: var(--gold);
            background: rgba(255,255,255,0.06);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.14);
        }
        .brand-title {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }
        .brand-subtitle {
            margin: 4px 0 0;
            color: #aeb8c7;
            font-size: 12px;
            line-height: 1.3;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 16px 16px 12px;
            min-height: 42px;
            color: #0f172a;
            background: var(--gold);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 8px;
            cursor: pointer;
            transition: background .18s ease, transform .18s ease;
        }
        .new-chat-btn:hover { background: #d8bd7a; transform: translateY(-1px); }

        .side-section {
            padding: 8px 16px 0;
        }
        .section-label {
            margin: 8px 0;
            color: #98a2b3;
            font-size: 12px;
            font-weight: 700;
        }
        .mode-panel {
            display: grid;
            gap: 8px;
        }
        .mode-option {
            width: 100%;
            min-height: 42px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            color: #d5dbe6;
            background: rgba(255,255,255,0.035);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: background .18s ease, border-color .18s ease, color .18s ease;
        }
        .mode-option:hover {
            color: #fff;
            background: rgba(255,255,255,0.075);
        }
        .mode-option.active {
            color: #fff;
            background: rgba(200,169,107,0.15);
            border-color: rgba(200,169,107,0.5);
        }
        .mode-dot {
            width: 18px;
            height: 18px;
            display: grid;
            place-items: center;
            flex: 0 0 18px;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.24);
            color: transparent;
            font-size: 7px;
        }
        .mode-option.active .mode-dot {
            color: var(--gold);
            border-color: var(--gold);
        }
        .mode-option > i {
            width: 16px;
            color: var(--gold);
            text-align: center;
        }

        .history-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 2px 8px 18px;
        }
        .history-item {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 4px 0;
            border-radius: 8px;
            color: #d5dbe6;
            background: transparent;
        }
        .history-item.active { background: rgba(200,169,107,0.14); }
        .history-open {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            color: inherit;
            background: transparent;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
        }
        .history-open:hover { background: rgba(255,255,255,0.06); }
        .history-title {
            min-width: 0;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-size: 13px;
        }
        .delete-session {
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            margin-right: 4px;
            color: #f3a5a5;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            opacity: 0;
        }
        .history-item:hover .delete-session { opacity: 1; }
        .delete-session:hover { color: #fff; background: rgba(180,35,24,0.72); }

        .sidebar-foot {
            padding: 14px 16px 18px;
            border-top: 1px solid rgba(255,255,255,0.08);
            color: #aeb8c7;
            font-size: 12px;
            line-height: 1.55;
        }
        .privacy-note {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-top: 8px;
        }
        .privacy-note i { color: #8ad2a2; margin-top: 3px; }

        .workspace {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--surface);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            min-height: 76px;
            padding: 14px 28px;
            background: rgba(255,255,255,0.96);
            border-bottom: 1px solid var(--line-soft);
        }
        .mobile-menu {
            display: none;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            color: var(--ink);
            background: var(--surface-soft);
            border: 1px solid var(--line);
            cursor: pointer;
        }
        .context-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
            color: var(--ink);
            font-weight: 700;
            font-size: 16px;
        }
        .context-title i { color: var(--gold); }
        .context-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .status-chip, .source-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            color: var(--ink-soft);
            background: var(--surface-soft);
            border: 1px solid var(--line-soft);
            white-space: nowrap;
        }
        .status-chip.online {
            color: var(--green);
            background: var(--green-soft);
            border-color: #bbefcc;
        }
        .source-chip i { color: var(--gold-deep); }
        .top-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chat-box {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 28px;
            background: var(--canvas);
            scroll-behavior: smooth;
        }
        .chat-inner {
            width: min(100%, 980px);
            margin: 0 auto;
        }

        .welcome-screen {
            width: min(100%, 980px);
            min-height: min(560px, calc(100vh - 210px));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            padding: 24px 0 12px;
            text-align: center;
            animation: fadeIn .28s ease;
        }
        .welcome-kicker {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            color: var(--gold-deep);
            background: var(--gold-soft);
            border: 1px solid #ead8ab;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }
        .welcome-heading {
            margin: 20px 0 8px;
            color: var(--ink);
            font-size: 42px;
            line-height: 1.12;
            font-weight: 780;
        }
        .welcome-copy {
            max-width: 660px;
            margin: 0 auto 24px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }
        .task-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(155px, 1fr));
            gap: 12px;
            width: min(100%, 780px);
        }
        .task-card {
            min-height: 142px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
            padding: 16px;
            color: var(--ink);
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(16,24,40,0.04);
            cursor: pointer;
            text-align: left;
            transition: border-color .18s ease, transform .18s ease, box-shadow .18s ease;
        }
        .task-card:hover {
            border-color: #d7c08a;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .task-icon {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            color: var(--primary);
            background: var(--primary-soft);
            border-radius: 8px;
        }
        .task-card.gold .task-icon { color: var(--gold); background: var(--gold-soft); }
        .task-card.green .task-icon { color: var(--green); background: var(--green-soft); }
        .task-card.red .task-icon { color: var(--red); background: var(--red-soft); }
        .task-card.dark .task-icon { color: var(--ink); background: var(--primary-soft); }
        .task-title {
            margin: 0;
            color: var(--ink);
            font-size: 15px;
            font-weight: 740;
            line-height: 1.35;
        }
        .task-desc {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }
        .task-example {
            margin-top: auto;
            color: var(--gold-deep);
            font-size: 12px;
            font-weight: 700;
        }
        .welcome-trust {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }
        .trust-card {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px;
            background: #fbfcfd;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            color: var(--ink-soft);
            font-size: 13px;
        }
        .trust-card i { color: var(--gold); }

        .message-row {
            display: flex;
            width: 100%;
            margin: 0 auto 20px;
            animation: fadeIn .22s ease;
        }
        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }
        .avatar-icon {
            width: 34px;
            height: 34px;
            display: grid;
            place-items: center;
            flex: 0 0 34px;
            border-radius: 8px;
            border: 1px solid var(--line-soft);
            background: var(--surface);
            color: var(--primary);
        }
        .message-row.user .avatar-icon {
            order: 2;
            margin-left: 10px;
            color: #fff;
            background: var(--primary);
            border-color: var(--primary);
        }
        .message-row.ai .avatar-icon { margin-right: 10px; }
        .message-bubble {
            max-width: min(880px, 84%);
            border-radius: 8px;
            line-height: 1.68;
            font-size: 15px;
        }
        .message-row.user .message-bubble {
            padding: 12px 14px;
            color: #fff;
            background: var(--ink);
            white-space: pre-wrap;
        }
        .message-row.ai .message-bubble {
            width: min(880px, calc(100vw - 420px));
            padding: 0;
            color: var(--ink);
            background: transparent;
        }

        .report-card {
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(15,23,42,0.06);
        }
        .report-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 16px;
            background: #fbfcfd;
            border-bottom: 1px solid var(--line-soft);
        }
        .report-title-block {
            min-width: 0;
            display: grid;
            gap: 6px;
        }
        .report-title {
            margin: 0;
            color: var(--ink);
            font-size: 17px;
            line-height: 1.35;
        }
        .report-subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 12px;
        }
        .route-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 28px;
            padding: 5px 10px;
            border-radius: 999px;
            color: var(--gold-deep);
            background: var(--gold-soft);
            font-size: 12px;
            font-weight: 750;
            white-space: nowrap;
        }
        .report-meta {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }
        .report-body { padding: 4px 16px 16px; }
        .report-metrics {
            display: grid;
            grid-template-columns: 1.1fr 1fr 1fr;
            gap: 10px;
            padding: 14px 0;
            border-bottom: 1px solid var(--line-soft);
        }
        .metric-card {
            min-height: 102px;
            padding: 13px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: #fbfcfd;
            text-align: left;
        }
        .metric-label {
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }
        .metric-label i { color: var(--gold-deep); }
        .metric-value {
            margin: 9px 0 7px;
            color: var(--ink);
            font-size: 30px;
            line-height: 1;
            font-weight: 780;
        }
        .metric-value.amount {
            font-size: 28px;
            line-height: 1.15;
            word-break: keep-all;
        }
        .currency-unit {
            margin-left: 2px;
            color: var(--muted);
            font-size: 16px;
            font-weight: 700;
        }
        .metric-caption {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }
        .metric-meter {
            height: 7px;
            overflow: hidden;
            margin-top: 10px;
            background: #eef2f7;
            border-radius: 999px;
        }
        .metric-fill {
            height: 100%;
            width: var(--metric, 64%);
            background: var(--gold);
        }
        .risk-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 760;
        }
        .risk-chip.low { color: var(--green); background: var(--green-soft); }
        .risk-chip.medium { color: var(--amber); background: var(--amber-soft); }
        .risk-chip.high { color: var(--red); background: var(--red-soft); }
        .report-section {
            padding: 14px 0;
            border-bottom: 1px solid var(--line-soft);
        }
        .report-section:last-child { border-bottom: 0; padding-bottom: 0; }
        .report-section h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 8px;
            color: var(--ink);
            font-size: 15px;
            line-height: 1.4;
        }
        .report-section h3 i { color: var(--gold); width: 18px; text-align: center; }
        .section-content {
            color: var(--ink-soft);
            font-size: 14px;
        }
        .section-content p { margin: 0 0 8px; }
        .section-content p:last-child { margin-bottom: 0; }
        .section-content ul, .section-content ol { margin: 6px 0 0 20px; padding: 0; }
        .section-content li { margin: 4px 0; }
        .section-content blockquote {
            margin: 8px 0;
            padding: 10px 12px;
            border-left: 3px solid var(--gold);
            background: var(--gold-soft);
            color: var(--ink-soft);
        }
        .section-content code {
            padding: 2px 5px;
            border-radius: 4px;
            background: #f1f3f6;
            color: #2f3b4a;
        }
        .issue-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .issue-card {
            padding: 11px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: #fbfcfd;
            color: var(--ink-soft);
            font-size: 13px;
            line-height: 1.5;
        }
        .issue-card strong {
            display: block;
            margin-bottom: 5px;
            color: var(--ink);
            font-size: 13px;
        }
        .calc-result-card {
            display: grid;
            grid-template-columns: minmax(180px, 0.72fr) 1fr;
            gap: 14px;
            padding: 14px;
            border: 1px solid #ead8ab;
            border-radius: 8px;
            background: var(--gold-soft);
        }
        .calc-amount-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid rgba(200,169,107,0.35);
        }
        .calc-amount-label {
            color: var(--gold-deep);
            font-size: 12px;
            font-weight: 760;
        }
        .calc-amount {
            color: var(--ink);
            font-size: 34px;
            line-height: 1;
            font-weight: 800;
        }
        .calc-formula {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }
        .calc-item {
            min-height: 58px;
            padding: 10px;
            border-radius: 8px;
            background: #fff;
            border: 1px solid rgba(15,23,42,0.08);
        }
        .calc-item span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
        }
        .calc-item strong {
            display: block;
            margin-top: 6px;
            color: var(--ink);
            font-size: 14px;
            line-height: 1.35;
            word-break: break-word;
        }
        .evidence-bars {
            display: grid;
            gap: 8px;
            margin-top: 8px;
        }
        .evidence-row {
            display: grid;
            grid-template-columns: 88px 1fr 46px;
            align-items: center;
            gap: 10px;
            color: var(--ink-soft);
            font-size: 13px;
        }
        .evidence-track {
            height: 8px;
            overflow: hidden;
            background: #eef2f7;
            border-radius: 999px;
        }
        .evidence-track span {
            display: block;
            width: var(--strength);
            height: 100%;
            background: var(--ink);
        }
        .case-timeline {
            display: grid;
            gap: 10px;
            margin-top: 8px;
        }
        .timeline-item {
            position: relative;
            display: grid;
            grid-template-columns: 92px 1fr;
            gap: 12px;
            align-items: start;
            padding-left: 2px;
            color: var(--ink-soft);
            font-size: 13px;
        }
        .timeline-date {
            color: var(--gold-deep);
            font-weight: 760;
        }
        .credibility-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .credibility-item {
            padding: 10px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: #fbfcfd;
        }
        .credibility-value {
            display: block;
            color: var(--ink);
            font-size: 18px;
            line-height: 1.2;
            font-weight: 780;
        }
        .credibility-label {
            display: block;
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
        }
        .source-details {
            display: grid;
            gap: 8px;
            margin-top: 10px;
        }
        details.source-card {
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: #fbfcfd;
        }
        .source-card summary {
            cursor: pointer;
            padding: 10px 12px;
            color: var(--ink);
            font-size: 13px;
            font-weight: 700;
        }
        .source-card div {
            padding: 0 12px 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }
        .risk-band {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .risk-meter {
            flex: 1;
            height: 8px;
            overflow: hidden;
            background: #eef0f3;
            border-radius: 999px;
        }
        .risk-fill {
            height: 100%;
            width: 64%;
            background: linear-gradient(90deg, var(--green), var(--gold), var(--red));
        }
        .raw-answer {
            margin-top: 4px;
        }
        .raw-answer details {
            border: 1px dashed var(--line);
            border-radius: 8px;
        }
        .raw-answer summary {
            padding: 10px 12px;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
        }
        .raw-answer .markdown-body {
            padding: 0 12px 12px;
        }

        .progress-card {
            width: min(880px, calc(100vw - 420px));
            padding: 14px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(16,24,40,0.04);
        }
        .progress-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 0 10px;
            color: var(--ink);
            font-weight: 750;
        }
        .progress-title i { color: var(--primary); }
        .progress-steps {
            display: grid;
            gap: 8px;
        }
        .progress-step {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 13px;
            opacity: 0;
            transform: translateY(4px);
            animation: stepIn .24s forwards;
        }
        .progress-step .step-dot {
            width: 22px;
            height: 22px;
            display: grid;
            place-items: center;
            color: var(--primary);
            background: var(--primary-soft);
            border-radius: 999px;
            font-size: 11px;
        }
        .runtime-state {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 26px;
            padding: 4px 9px;
            border-radius: 999px;
            color: var(--muted);
            background: var(--surface-soft);
            font-size: 12px;
            font-weight: 700;
        }
        .runtime-state.streaming,
        .runtime-state.thinking {
            color: var(--gold-deep);
            background: var(--gold-soft);
        }
        .runtime-state.error {
            color: var(--red);
            background: var(--red-soft);
        }
        .runtime-dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: currentColor;
            animation: pulseDot 1s ease-in-out infinite;
        }
        .metric-card.placeholder,
        .structured-placeholder {
            background: linear-gradient(90deg, #f4f7fb, #ffffff, #f4f7fb);
            background-size: 220% 100%;
            animation: shimmer 1.3s ease-in-out infinite;
        }
        .ai-answer-card {
            min-height: 96px;
            padding: 14px;
            border: 1px solid var(--line-soft);
            border-radius: 8px;
            background: #fbfcfd;
        }
        .ai-answer-card .section-content {
            color: var(--ink);
        }
        .stream-caret {
            display: inline-block;
            width: 8px;
            height: 18px;
            margin-left: 2px;
            vertical-align: text-bottom;
            background: var(--gold);
            animation: caretBlink 1s step-end infinite;
        }
        .empty-answer {
            color: var(--muted);
            font-size: 14px;
        }
        .stream-follow-btn {
            position: fixed;
            right: 28px;
            bottom: 118px;
            z-index: 45;
            display: none;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 9px 13px;
            border-radius: 999px;
            color: #fff;
            background: var(--ink);
            box-shadow: 0 12px 28px rgba(15,23,42,0.22);
            cursor: pointer;
        }
        .stream-follow-btn.show { display: inline-flex; }
        .stream-follow-btn i { color: var(--gold); }

        .input-area {
            padding: 14px 28px 18px;
            background: rgba(248,250,252,0.96);
            border-top: 1px solid var(--line-soft);
        }
        .input-panel {
            width: min(100%, 900px);
            margin: 0 auto;
        }
        .case-hints {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }
        .hint-list {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 2px;
        }
        .hint-chip {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 30px;
            padding: 6px 10px;
            color: var(--ink-soft);
            background: var(--surface-soft);
            border: 1px solid var(--line-soft);
            border-radius: 999px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 12px;
        }
        .hint-chip:hover {
            color: var(--ink);
            border-color: #d7c08a;
            background: var(--gold-soft);
        }
        .upload-disabled {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            min-height: 30px;
            padding: 6px 10px;
            color: var(--muted);
            background: #fff;
            border: 1px solid var(--line-soft);
            border-radius: 999px;
            cursor: not-allowed;
            font-size: 12px;
            white-space: nowrap;
        }
        .composer {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 12px;
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 16px 38px rgba(15,23,42,0.08);
        }
        .composer:focus-within {
            border-color: #d7c08a;
            box-shadow: 0 0 0 3px rgba(200,169,107,0.18), 0 18px 42px rgba(15,23,42,0.1);
        }
        textarea {
            flex: 1;
            min-width: 0;
            min-height: 52px;
            max-height: 170px;
            resize: none;
            border: 0;
            outline: 0;
            padding: 13px 4px 9px;
            color: var(--ink);
            background: transparent;
            font-size: 15px;
            line-height: 1.55;
        }
        textarea::placeholder { color: #98a2b3; }
        .send-button {
            width: 42px;
            height: 42px;
            display: grid;
            place-items: center;
            flex: 0 0 42px;
            color: #0f172a;
            background: var(--gold);
            border-radius: 14px;
            cursor: pointer;
            transition: background .18s ease, transform .18s ease;
        }
        .send-button:hover:not(:disabled) { background: #d8bd7a; transform: translateY(-1px); }
        .send-button:disabled {
            background: #cfd6df;
            cursor: not-allowed;
            transform: none;
        }
        .legal-disclaimer {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 8px 2px 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }
        .legal-disclaimer i { color: var(--gold); }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(16,24,40,0.42);
            z-index: 20;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes stepIn {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseDot {
            0%, 100% { opacity: .45; transform: scale(.9); }
            50% { opacity: 1; transform: scale(1.15); }
        }
        @keyframes shimmer {
            0% { background-position: 120% 0; }
            100% { background-position: -120% 0; }
        }
        @keyframes caretBlink {
            0%, 45% { opacity: 1; }
            46%, 100% { opacity: 0; }
        }

        @media (max-width: 1180px) {
            .task-grid { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
            .welcome-trust { grid-template-columns: 1fr; }
            .report-metrics,
            .credibility-panel { grid-template-columns: 1fr; }
            .issue-grid { grid-template-columns: 1fr; }
            .calc-result-card { grid-template-columns: 1fr; }
        }
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                inset: 0 auto 0 0;
                transform: translateX(-100%);
                transition: transform .22s ease;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .mobile-menu { display: grid; place-items: center; }
            .topbar {
                min-height: auto;
                padding: 12px 16px;
                align-items: flex-start;
            }
            .top-actions { display: none; }
            .chat-box { padding: 18px 14px; }
            .input-area { padding: 12px 14px 14px; }
            .stream-follow-btn {
                right: 16px;
                bottom: 104px;
            }
            .message-row.ai .message-bubble,
            .progress-card {
                width: calc(100vw - 72px);
                max-width: none;
            }
            .message-bubble { max-width: calc(100vw - 72px); }
            .task-grid { grid-template-columns: 1fr; }
            .case-hints { align-items: stretch; flex-direction: column; gap: 8px; }
            .upload-disabled { width: fit-content; }
        }
        @media (max-width: 560px) {
            .welcome-heading { font-size: 29px; }
            .welcome-copy { font-size: 14px; }
            .context-title { font-size: 15px; }
            .source-chip:nth-child(n+3) { display: none; }
            .report-head { align-items: flex-start; flex-direction: column; }
            .report-meta { white-space: normal; }
            .message-row.user .message-bubble { max-width: calc(100vw - 86px); }
            .legal-disclaimer { align-items: flex-start; }
            .evidence-row { grid-template-columns: 76px 1fr 40px; gap: 8px; }
            .timeline-item { grid-template-columns: 78px 1fr; }
            .calc-grid { grid-template-columns: 1fr; }
            .calc-amount { font-size: 28px; }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="brand-mark"><i class="fas fa-balance-scale"></i></div>
            <div>
                <h1 class="brand-title">劳法智枢</h1>
                <p class="brand-subtitle">劳动法 AI 决策工作台</p>
            </div>
        </div>

        <button class="new-chat-btn" id="newChatBtn" type="button">
            <i class="fas fa-plus"></i>
            新建案件分析
        </button>

        <div class="side-section">
            <div class="section-label">当前模式</div>
            <div class="mode-panel" id="modePanel" aria-label="当前模式">
                <button class="mode-option active" type="button" data-mode="auto">
                    <span class="mode-dot"><i class="fas fa-circle"></i></span>
                    <i class="fas fa-magic"></i>
                    <span>智能分析</span>
                </button>
                <button class="mode-option" type="button" data-mode="qa">
                    <span class="mode-dot"><i class="fas fa-circle"></i></span>
                    <i class="fas fa-book"></i>
                    <span>法律问答</span>
                </button>
                <button class="mode-option" type="button" data-mode="calc">
                    <span class="mode-dot"><i class="fas fa-circle"></i></span>
                    <i class="fas fa-calculator"></i>
                    <span>赔偿计算</span>
                </button>
                <button class="mode-option" type="button" data-mode="judge">
                    <span class="mode-dot"><i class="fas fa-circle"></i></span>
                    <i class="fas fa-chart-line"></i>
                    <span>案件预判</span>
                </button>
                <button class="mode-option" type="button" data-mode="doc">
                    <span class="mode-dot"><i class="fas fa-circle"></i></span>
                    <i class="fas fa-file-signature"></i>
                    <span>文书生成</span>
                </button>
            </div>
        </div>

        <div class="side-section">
            <div class="section-label">历史对话</div>
        </div>
        <div class="history-list" id="historyList"></div>

        <div class="sidebar-foot">
            <div><i class="fas fa-shield-alt"></i> 本地浏览器保存会话记录</div>
            <div class="privacy-note">
                <i class="fas fa-lock"></i>
                <span>结果供参考，具体案件建议结合证据咨询执业律师。</span>
            </div>
        </div>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <main class="workspace">
        <header class="topbar">
            <button class="mobile-menu" id="mobileMenuBtn" type="button" aria-label="打开侧边栏">
                <i class="fas fa-bars"></i>
            </button>
            <div>
                <div class="context-title">
                    <i class="fas fa-briefcase"></i>
                    <span id="currentModeTitle">当前模式：智能分析</span>
                </div>
                <div class="context-meta">
                    <span class="status-chip online"><i class="fas fa-circle"></i> 法条检索可用</span>
                    <span class="source-chip"><i class="fas fa-book"></i> 法律依据</span>
                    <span class="source-chip"><i class="fas fa-balance-scale"></i> 裁判口径</span>
                    <span class="source-chip"><i class="fas fa-shield-alt"></i> 风险提示</span>
                </div>
            </div>
        </header>

        <section class="chat-box" id="chatBox" aria-live="polite"></section>
        <button class="stream-follow-btn" id="streamFollowBtn" type="button" aria-label="跳转到最新 AI 输出">
            <i class="fas fa-arrow-down"></i>
            <span>AI 正在生成</span>
        </button>

        <footer class="input-area">
            <div class="input-panel">
                <div class="case-hints">
                    <div class="hint-list" aria-label="常用信息补充">
                        <button class="hint-chip" type="button" data-insert="月工资：；工作年限：；解除原因：；"><i class="fas fa-coins"></i> 工资与工龄</button>
                        <button class="hint-chip" type="button" data-insert="证据材料：劳动合同、工资流水、考勤记录、解除通知；"><i class="fas fa-folder-open"></i> 证据材料</button>
                        <button class="hint-chip" type="button" data-insert="请按案件预判方式分析：入职时间：；争议行为：；已有证据：；诉求：；"><i class="fas fa-chart-line"></i> 一键案例分析</button>
                    </div>
                    <button class="upload-disabled" type="button" disabled title="即将支持劳动合同与仲裁材料分析">
                        <i class="fas fa-paperclip"></i>
                        上传仲裁材料
                    </button>

                    <textarea id="messageInput" rows="1" placeholder="请输入劳动争议问题、赔偿计算需求或案件事实..."></textarea>

                        <i class="fas fa-paper-plane"></i>
                    </button>

                    <span>AI 分析不能替代律师意见；关键事实、证据真实性和地方裁判口径会影响最终结果。</span>
